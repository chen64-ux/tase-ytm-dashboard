name: TASE YTM Update

on:
  schedule:
    - cron: "30 7 * * 0-4"
    - cron: "30 11 * * 0-4"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests openpyxl python-dateutil scipy

      - name: Run daily update
        run: python run_daily_update.py

      - name: Commit and push changes
        run: |
          git config user.name "tase-bot"
          git config user.email "tase-bot@users.noreply.github.com"
          git add ytm_computed.xlsx docs/ytm_dashboard.html
          if git diff --cached --quiet; then
            echo "אין שינויים לשמור."
          else
            git commit -m "עדכון אוטומטי: $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
